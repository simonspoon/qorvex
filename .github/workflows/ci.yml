name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: brew install chafa

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Test
        # --features test-support enables the qorvex-core parity harness
        # (crates/qorvex-core/tests/android_parity.rs is #![cfg(feature =
        # "test-support")]); without it those 20 tests compile out.
        run: cargo test --workspace --all-targets --features test-support

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  swift:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build qorvex-streamer
        run: make -C qorvex-streamer build

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Unit tests (Kotlin agent + sample app, no emulator)
        run: make android-test

      - name: Build Android APKs (agent + sample app)
        run: make android
