name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: brew install chafa

      - name: Install x86_64 chafa for cross-compile
        run: |
          arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" </dev/null
          arch -x86_64 /usr/local/bin/brew install chafa

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        # --features test-support enables the qorvex-core parity harness
        # (crates/qorvex-core/tests/android_parity.rs is #![cfg(feature =
        # "test-support")]); without it those 20 tests compile out, so the
        # release would not gate on parity.
        run: cargo test --workspace --all-targets --features test-support

      - name: Build arm64 Rust binaries
        run: |
          mkdir -p dist-arm64
          cargo build --release --workspace
          for bin in qorvex-server qorvex-repl qorvex-live qorvex; do
            cp "target/release/$bin" "dist-arm64/$bin"
          done

      - name: Build x86_64 Rust binaries
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
        run: |
          mkdir -p dist-x86_64
          cargo build --release --workspace --target x86_64-apple-darwin
          for bin in qorvex-server qorvex-repl qorvex-live qorvex; do
            cp "target/x86_64-apple-darwin/release/$bin" "dist-x86_64/$bin"
          done

      - name: Build arm64 qorvex-streamer
        run: |
          swift build -c release --package-path qorvex-streamer
          cp qorvex-streamer/.build/release/qorvex-streamer dist-arm64/qorvex-streamer

      - name: Build x86_64 qorvex-streamer
        run: |
          swift build -c release --package-path qorvex-streamer --arch x86_64
          cp qorvex-streamer/.build/release/qorvex-streamer dist-x86_64/qorvex-streamer

      - name: Bundle agent source
        run: |
          brew install xcodegen
          cd qorvex-agent && xcodegen generate && cd ..
          mkdir -p agent
          cp -R qorvex-agent/QorvexAgent.xcodeproj agent/
          cp -R qorvex-agent/Sources agent/
          cp -R qorvex-agent/App agent/
          cp qorvex-agent/project.yml agent/
          cp qorvex-agent/Makefile agent/

      - name: Bundle Android agent source
        run: |
          # Ship the Kotlin agent as source (the iOS parallel): the runtime
          # builds it on the host via gradlew, so bundle the Gradle project
          # minus the local build artifacts (.gradle/, build/, local.properties
          # are gitignored and host-specific).
          mkdir -p agent-android
          rsync -a \
            --exclude '.gradle/' \
            --exclude 'build/' \
            --exclude 'local.properties' \
            --exclude '*.iml' \
            --exclude '.idea/' \
            --exclude '.kotlin/' \
            qorvex-agent-android/ agent-android/

      - name: Create tarballs
        run: |
          cp -R agent dist-arm64/agent
          cp -R agent dist-x86_64/agent
          cp -R agent-android dist-arm64/agent-android
          cp -R agent-android dist-x86_64/agent-android
          cd dist-arm64
          tar czf ../qorvex-macos-arm64.tar.gz \
            qorvex-server qorvex-repl qorvex-live qorvex qorvex-streamer agent agent-android
          cd ../dist-x86_64
          tar czf ../qorvex-macos-x86_64.tar.gz \
            qorvex-server qorvex-repl qorvex-live qorvex qorvex-streamer agent agent-android
          cd ..
          shasum -a 256 qorvex-macos-*.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            qorvex-macos-arm64.tar.gz
            qorvex-macos-x86_64.tar.gz
            checksums.txt
          generate_release_notes: true
          body: |
            ## Install

            **Homebrew (recommended):**

            ```bash
            brew install simonspoon/tap/qorvex
            ```

            The Swift agent is automatically built during installation (requires Xcode).

            **Manual (Apple Silicon):**

            ```bash
            tar xzf qorvex-macos-arm64.tar.gz
            mv qorvex-server qorvex-repl qorvex-live qorvex qorvex-streamer ~/.cargo/bin/
            ```

            **Manual (Intel):**

            ```bash
            tar xzf qorvex-macos-x86_64.tar.gz
            mv qorvex-server qorvex-repl qorvex-live qorvex qorvex-streamer ~/.cargo/bin/
            ```

            The tarball includes the agent source in `agent/`. To build it manually:

            ```bash
            cd agent
            xcodebuild build-for-testing \
              -project QorvexAgent.xcodeproj \
              -scheme QorvexAgentUITests \
              -destination "generic/platform=iOS Simulator" \
              -derivedDataPath .build
            ```

            See README for full setup instructions.

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ubuntu-latest ships an Android SDK; ANDROID_HOME/ANDROID_SDK_ROOT are
      # preset. This action makes the requested platform + build-tools present
      # (matching qorvex-agent-android/build.gradle.kts: compileSdk 35).
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build Kotlin agent APKs
        run: |
          cd qorvex-agent-android
          ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Build sample-app APK
        run: |
          cd qorvex-testapp-android
          ./gradlew assembleDebug

      - name: Collect Android artifacts
        run: |
          mkdir -p android-dist
          cp qorvex-agent-android/build/outputs/apk/debug/*.apk \
            android-dist/qorvex-agent-android-debug.apk
          cp qorvex-agent-android/build/outputs/apk/androidTest/debug/*.apk \
            android-dist/qorvex-agent-android-androidTest-debug.apk
          cp qorvex-testapp-android/build/outputs/apk/debug/*.apk \
            android-dist/qorvex-testapp-android-debug.apk
          cd android-dist
          tar czf ../qorvex-android.tar.gz \
            qorvex-agent-android-debug.apk \
            qorvex-agent-android-androidTest-debug.apk \
            qorvex-testapp-android-debug.apk
          cd ..
          shasum -a 256 qorvex-android.tar.gz > android-checksums.txt

      - name: Add Android artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            qorvex-android.tar.gz
            android-checksums.txt

  update-tap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/simonspoon/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[tool]=qorvex" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[repo]=simonspoon/qorvex"
