name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: brew install chafa

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Build Rust binaries
        run: |
          mkdir -p dist
          cargo build --release --workspace
          for bin in qorvex-server qorvex-repl qorvex-live qorvex; do
            cp "target/release/$bin" "dist/$bin"
          done

      - name: Build qorvex-streamer
        run: |
          make -C qorvex-streamer build
          cp qorvex-streamer/.build/release/qorvex-streamer dist/qorvex-streamer

      - name: Bundle agent source
        run: |
          brew install xcodegen
          cd qorvex-agent && xcodegen generate && cd ..
          mkdir -p dist/agent
          cp -R qorvex-agent/QorvexAgent.xcodeproj dist/agent/
          cp -R qorvex-agent/Sources dist/agent/
          cp -R qorvex-agent/App dist/agent/
          cp qorvex-agent/project.yml dist/agent/
          cp qorvex-agent/Makefile dist/agent/

      - name: Create tarball
        run: |
          cd dist
          tar czf qorvex-macos-${{ matrix.arch }}.tar.gz \
            qorvex-server qorvex-repl qorvex-live qorvex qorvex-streamer agent

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: qorvex-macos-${{ matrix.arch }}
          path: dist/qorvex-macos-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/qorvex-macos-arm64/qorvex-macos-arm64.tar.gz release/
          cp artifacts/qorvex-macos-x86_64/qorvex-macos-x86_64.tar.gz release/
          cd release
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/qorvex-macos-arm64.tar.gz
            release/qorvex-macos-x86_64.tar.gz
            release/checksums.txt
          generate_release_notes: true
          body: |
            ## Install

            **Homebrew (recommended):**

            ```bash
            brew install simonspoon/tap/qorvex
            ```

            The Swift agent is automatically built during installation (requires Xcode).

            **Manual (Apple Silicon):**

            ```bash
            tar xzf qorvex-macos-arm64.tar.gz
            mv qorvex-server qorvex-repl qorvex-live qorvex qorvex-streamer ~/.cargo/bin/
            ```

            **Manual (Intel):**

            ```bash
            tar xzf qorvex-macos-x86_64.tar.gz
            mv qorvex-server qorvex-repl qorvex-live qorvex qorvex-streamer ~/.cargo/bin/
            ```

            The tarball includes the agent source in `agent/`. To build it manually:

            ```bash
            cd agent
            xcodebuild build-for-testing \
              -project QorvexAgent.xcodeproj \
              -scheme QorvexAgentUITests \
              -destination "generic/platform=iOS Simulator" \
              -derivedDataPath .build
            ```

            See README for full setup instructions.

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/simonspoon/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[tool]=qorvex" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[repo]=simonspoon/qorvex"
