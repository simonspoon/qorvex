<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#0d1117"/>

  <!-- Shield outline — dark -->
  <rect x="1" y="0" width="14" height="1" fill="#1e3a5f"/>
  <rect x="0" y="1" width="16" height="7" fill="#1e3a5f"/>
  <rect x="1" y="8" width="14" height="1" fill="#1e3a5f"/>
  <rect x="2" y="9" width="12" height="1" fill="#1e3a5f"/>
  <rect x="3" y="10" width="10" height="1" fill="#1e3a5f"/>
  <rect x="4" y="11" width="8" height="1" fill="#1e3a5f"/>
  <rect x="5" y="12" width="6" height="1" fill="#1e3a5f"/>
  <rect x="6" y="13" width="4" height="1" fill="#1e3a5f"/>
  <rect x="7" y="14" width="2" height="1" fill="#1e3a5f"/>

  <!-- Shield fill — blue -->
  <rect x="2" y="1" width="12" height="1" fill="#3b82f6"/>
  <rect x="1" y="2" width="14" height="5" fill="#3b82f6"/>
  <rect x="2" y="7" width="12" height="1" fill="#3b82f6"/>
  <rect x="2" y="8" width="12" height="1" fill="#3b82f6"/>
  <rect x="3" y="9" width="10" height="1" fill="#3b82f6"/>
  <rect x="4" y="10" width="8" height="1" fill="#3b82f6"/>
  <rect x="5" y="11" width="6" height="1" fill="#3b82f6"/>
  <rect x="6" y="12" width="4" height="1" fill="#3b82f6"/>
  <rect x="7" y="13" width="2" height="1" fill="#3b82f6"/>

  <!-- Upper-left highlight -->
  <rect x="2" y="1" width="5" height="1" fill="#60a5fa"/>
  <rect x="1" y="2" width="5" height="1" fill="#60a5fa"/>
  <rect x="1" y="3" width="4" height="1" fill="#60a5fa"/>

  <!-- Chevron emblem — V shape in glow -->
  <rect x="3" y="3" width="2" height="1" fill="#bfdbfe"/>
  <rect x="11" y="3" width="2" height="1" fill="#bfdbfe"/>
  <rect x="4" y="4" width="2" height="1" fill="#bfdbfe"/>
  <rect x="10" y="4" width="2" height="1" fill="#bfdbfe"/>
  <rect x="5" y="5" width="2" height="1" fill="#bfdbfe"/>
  <rect x="9" y="5" width="2" height="1" fill="#bfdbfe"/>
  <rect x="6" y="6" width="2" height="1" fill="#bfdbfe"/>
  <rect x="8" y="6" width="2" height="1" fill="#bfdbfe"/>
  <rect x="7" y="7" width="2" height="1" fill="#dbeafe"/>

  <!-- Center point glow -->
  <rect x="7" y="7" width="2" height="1" fill="#eff6ff"/>
</svg>
